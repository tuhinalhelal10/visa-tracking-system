<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Visa Status System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0px 10px 25px rgba(0,0,0,0.05); width: 340px; }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            // 🔑 এখানে আপনার সঠিক ইউজারনেম ও পাসওয়ার্ড দেওয়া হলো
            const CORRECT_USER = 'admin';
            const CORRECT_PASS = 'Bangla@12345';

            if (usernameInput === CORRECT_USER && passwordInput === CORRECT_PASS) {
                // সেশন বা লোকাল স্টোরেজে সফল লগইন মার্ক করা হচ্ছে
                localStorage.setItem('isAdmin', 'true');
                
                // 🚀 মঙ্গোডিবি রাউটের সাথে মিল রেখে সঠিকভাবে রিডাইরেক্ট করা হচ্ছে
                window.location.href = '/admin/dashboard';
            } else {
                alert('Invalid Username or Password!');
            }
        });

        // যদি অলরেডি লগইন করা থাকে তবে সরাসরি ড্যাশবোর্ডে পাঠিয়ে দেবে
        if (localStorage.getItem('isAdmin') === 'true') {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>
